esphome:
  name: esp32-s3-matrix
  friendly_name: "ESP32-S3 8x8 Matrix"
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
   framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_I2C_SKIP_LEGACY_CONFLICT_CHECK: y

external_components:
  - source: github://Djelibeybi/esphome-qmi8658@main
    components: [qmi8658]
    refresh: 5s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

captive_portal:

web_server:
  port: 80
  version: 3
  include_internal: true
  local: false

logger:
  level: WARN

debug:
  update_interval: 30s

# I2C setup for the onboard QMI8658 IMU
i2c:
  sda: GPIO11
  scl: GPIO12
  scan: true

qmi8658:
  id: imu_sensor
  address: 0x6B
  update_interval: 500ms
  accel_range: 4G
  gyro_range: 512DPS
  accel_odr: 500HZ
  gyro_odr: 500HZ
  rotation: 0
  invert_z: true
  
text_sensor:
  - platform: version
    name: "ESPHome Version"
    hide_timestamp: true
      
  - platform: qmi8658
    qmi8658_id: imu_sensor
    orientation:
      name: "QMI8658 Orientation"

sensor:
  - platform: internal_temperature
    name: "ESP32-S3 Internal Temperature"
    entity_category: diagnostic
  
  - platform: qmi8658
    qmi8658_id: imu_sensor

    accel_x:
      name: "QMI8658 Acceleration X"
      id: qmi_accel_x
    accel_y:
      name: "QMI8658 Acceleration Y"
      id: qmi_accel_y
    accel_z:
      name: "QMI8658 Acceleration Z"
      id: qmi_accel_z
    gyro_x:
      name: "QMI8658 Gyro X"
    gyro_y:
      name: "QMI8658 Gyro Y"
    gyro_z:
      name: "QMI8658 Gyro Z"
    temperature:
      name: "QMI8658 Temperature"
    pitch:
      name: "QMI8658 Pitch"
    roll:
      name: "QMI8658 Roll"

binary_sensor:
  - platform: qmi8658
    qmi8658_id: imu_sensor
    motion:
      name: "QMI8658 Motion Detected"
      entity_category: diagnostic
      threshold: 0.5
      filters:
        - delayed_off: 1s