substitutions:
  devicename: "example-esp32-s3"
  friendly_name: "Example ESP32-S3"

esphome:
  name: ${devicename}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:

api:

ota:
  - platform: esphome
